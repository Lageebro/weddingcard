<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation - Linoshan & Sajiniya</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Cinzel:wght@400;600&display=swap"
        rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBase: '#23181c', // Deep soft black/brown
                        lightBase: '#faf5ff', // Very light lavender/white
                        goldAccent: '#d4af37',
                        darkText: '#23181c'
                    },
                    fontFamily: {
                        script: ['Great Vibes', 'cursive'],
                        serif: ['Playfair Display', 'serif'],
                        cinzel: ['Cinzel', 'serif']
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #1a1114;
            background-image: radial-gradient(circle at center, #23181c 0%, #0a0708 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            padding: 2rem 1rem;
        }

        @keyframes containerEntrance {
            0% {
                opacity: 0;
                transform: translateY(40px) scale(0.95);
            }

            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes pulseGlow {
            0% {
                box-shadow: inset 0 0 15px rgba(212, 175, 55, 0.4), 0 10px 25px rgba(0, 0, 0, 0.6), 0 0 0 2px rgba(212, 175, 55, 0.6);
            }

            100% {
                box-shadow: inset 0 0 25px rgba(212, 175, 55, 0.6), 0 15px 35px rgba(0, 0, 0, 0.8), 0 0 0 6px rgba(212, 175, 55, 0.7), 0 0 25px rgba(212, 175, 55, 0.5);
            }
        }

        @keyframes goldShine {
            0% {
                background-position: -200% center;
            }

            100% {
                background-position: 200% center;
            }
        }

        .perspective-container {
            perspective: 2500px;
            width: 100%;
            max-width: 500px;
            height: 700px;
            position: relative;
            animation: containerEntrance 1.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        .card-wrapper {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 1.2s cubic-bezier(0.645, 0.045, 0.355, 1);
            transform-origin: left center;
            box-shadow: 10px 10px 30px rgba(0, 0, 0, 0.5);
        }

        .card-wrapper.open {
            transform: translateX(100%) rotateY(-180deg);
        }

        .face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 8px;
            overflow: hidden;
        }

        /* Front Face */
        .front-face {
            transform: rotateY(0deg);
            display: flex;
            background: #faf5ff;
            z-index: 2;
        }

        .front-left {
            width: 40%;
            background-color: #23181c;
            height: 100%;
            position: relative;
            border-right: 2px solid #d4af37;
        }

        .front-right {
            width: 60%;
            height: 100%;
            position: relative;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background-image: url('data:image/svg+xml;utf8,<svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg"><defs><pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse"><circle fill="%23d4af37" cx="2" cy="2" r="1" opacity="0.2"/></pattern></defs><rect x="0" y="0" width="100%" height="100%" fill="url(%23dots)"/></svg>');
        }

        /* Gold Strings */
        .gold-line {
            position: absolute;
            height: 2px;
            background: linear-gradient(90deg, transparent, #d4af37, #fdf6d8, #d4af37, transparent);
            background-size: 200% auto;
            width: 100%;
            left: 0;
            z-index: 10;
            animation: goldShine 3s linear infinite;
        }

        /* Centerpiece */
        .centerpiece {
            position: absolute;
            top: 50%;
            left: 40%;
            transform: translate(-50%, -50%);
            width: 180px;
            height: 180px;
            background-color: #23181c;
            border-radius: 50%;
            border: 3px solid #d4af37;
            /* Elegant glowing border and depth */
            box-shadow:
                inset 0 0 15px rgba(212, 175, 55, 0.4),
                0 10px 25px rgba(0, 0, 0, 0.6),
                0 0 0 2px rgba(212, 175, 55, 0.6);
            z-index: 20;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.4s ease;
            animation: pulseGlow 2.5s infinite alternate ease-in-out;
        }

        .centerpiece:hover {
            transform: translate(-50%, -50%) scale(1.05);
            animation-play-state: paused;
            box-shadow:
                inset 0 0 25px rgba(212, 175, 55, 0.6),
                0 15px 35px rgba(0, 0, 0, 0.7),
                0 0 0 3px rgba(212, 175, 55, 0.8),
                0 0 20px rgba(212, 175, 55, 0.4);
        }


        .back-face {
            transform: rotateY(180deg);
            background-color: #faf5ff;
            background-image: url('data:image/svg+xml;utf8,<svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg"><defs><pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse"><circle fill="%23d4af37" cx="2" cy="2" r="1" opacity="0.1"/></pattern></defs><rect x="0" y="0" width="100%" height="100%" fill="url(%23dots)"/></svg>');
            display: flex;
            flex-direction: column;
            border: 8px solid #23181c;
            padding: 2rem;
            box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.1);
            overflow-y: auto;
            scrollbar-width: none;
        }

        /* Mandala Corners */
        .mandala {
            position: absolute;
            width: 80px;
            height: 80px;
            background-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><path fill="none" stroke="%23d4af37" stroke-width="2" d="M50 0 C50 20 80 50 100 50 C80 50 50 80 50 100 C50 80 20 50 0 50 C20 50 50 20 50 0 Z"/><circle cx="50" cy="50" r="10" fill="none" stroke="%23d4af37" stroke-width="2"/></svg>');
            background-size: cover;
            opacity: 0.8;
            pointer-events: none;
        }

        .m-tr {
            top: 10px;
            right: 10px;
            transform: rotate(90deg);
        }

        .m-br {
            bottom: 10px;
            right: 10px;
            transform: rotate(180deg);
        }

        .m-tl {
            top: 10px;
            left: 10px;
            transform: rotate(0deg);
        }

        .m-bl {
            bottom: 10px;
            left: 10px;
            transform: rotate(-90deg);
        }

        /* Inside content */
        .inner-content {
            opacity: 0;
            transform: scale(0.95) translateY(20px);
            transition: all 1s cubic-bezier(0.2, 0.8, 0.2, 1) 0.6s;
            text-align: center;
            height: 100%;
        }

        .card-wrapper.open .inner-content {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        .icon-gold {
            background: linear-gradient(135deg, #d4af37 0%, #a67c00 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Scale effect for mobile */
        @media (max-width: 600px) {
            body {
                padding: 1rem 0.5rem;
            }

            .perspective-container {
                height: 80vh;
                max-height: 550px;
                width: 96vw;
            }

            .card-wrapper.open {
                transform: translateX(100%) rotateY(-180deg) scale(0.96);
            }

            .centerpiece {
                width: 130px;
                height: 130px;
            }

            .front-right {
                padding: 1rem;
            }

            .ml-10 {
                margin-left: 1.5rem !important;
            }

            .pr-4 {
                padding-right: 0.5rem !important;
            }

            .text-5xl {
                font-size: 2.5rem !important;
            }

            .text-2xl {
                font-size: 1.25rem !important;
            }

            .space-y-4> :not([hidden])~ :not([hidden]) {
                margin-top: 0.5rem !important;
            }
        }
    </style>
</head>

<body>

    <!-- Instruction Overlay -->
    <div id="instruction"
        class="fixed top-10 text-goldAccent opacity-80 animate-pulse text-sm font-serif tracking-widest z-0 pointer-events-none">
        TAP THE CENTER BADGE TO OPEN
    </div>

    <div class="perspective-container">
        <div class="card-wrapper" id="card">

            <!-- FRONT COVER -->
            <div class="face front-face">
                <div class="front-left">
                    <div class="mandala m-tl opacity-30"></div>
                    <div class="mandala m-bl opacity-30"></div>
                </div>

                <div class="front-right">
                    <div class="mandala m-tr"></div>
                    <div class="mandala m-br"></div>

                    <div class="text-center font-cinzel text-darkBase tracking-widest space-y-4 pr-4 ml-10">
                        <p class="text-xs uppercase tracking-[0.3em] text-gray-500 mb-6">Wedding Ceremony</p>

                        <div class="space-y-2 py-8 relative">
                            <h2 class="text-2xl font-bold">INVITATION</h2>
                            <p class="text-[0.6rem] uppercase tracking-widest text-darkBase/70">To our beloved families
                            </p>
                        </div>

                        <div class="pt-8">
                            <p class="text-4xl font-script text-goldAccent tracking-wide drop-shadow-sm">
                                L <span class="font-serif text-xl mx-2 text-darkBase/50">&amp;</span> S
                            </p>
                        </div>
                    </div>
                </div>

                <!-- Gold Strings -->
                <div class="gold-line" style="top: 30%;"></div>
                <div class="gold-line" style="top: 50%;"></div>
                <div class="gold-line" style="top: 70%;"></div>

                <!-- Centerpiece (Clickable) -->
                <div class="centerpiece" id="openBtn" onclick="toggleCard()">
                    <div class="w-full h-full rounded-full overflow-hidden absolute top-0 left-0 z-10">
                        <img src="logo.jpeg" alt="Wedding Logo" class="w-full h-full object-cover">
                    </div>
                    <!-- Decorative elements around centerpiece -->
                    <div class="absolute -top-4 -left-4 text-4xl z-20 drop-shadow-md opacity-90">💌</div>
                </div>
            </div>

            <!-- INSIDE COVER -->
            <div class="face back-face relative overflow-hidden" style="padding: 0; border: none;">
                <!-- Close Button -->
                <button onclick="toggleCard()"
                    class="absolute top-4 right-4 z-50 w-8 h-8 rounded-full bg-darkBase text-goldAccent flex items-center justify-center hover:bg-goldAccent hover:text-darkBase transition-colors shadow-md">
                    <i class="fas fa-times"></i>
                </button>

                <div class="inner-content w-full h-full relative">
                    <img id="inviteImage" src="English.jpg" alt="Wedding Invitation"
                        class="w-full h-full object-contain transition-opacity duration-500"
                        style="opacity: 1; -webkit-transform: translateZ(0); transform: translateZ(0); image-rendering: -webkit-optimize-contrast;">
                    <button id="langToggleBtn" onclick="toggleLanguage()"
                        class="absolute bottom-6 left-1/2 -translate-x-1/2 px-8 py-2 bg-darkBase text-goldAccent border border-goldAccent rounded-full font-serif font-bold text-sm tracking-wider hover:bg-goldAccent hover:text-darkBase transition-colors shadow-xl z-50">
                        Tamil
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // DOM Elements
        const card = document.getElementById('card');
        const instruction = document.getElementById('instruction');

        // Toggle Card Animation
        function toggleCard() {
            card.classList.toggle('open');
            if (card.classList.contains('open')) {
                instruction.style.opacity = '0';
            } else {
                setTimeout(() => { instruction.style.opacity = '0.8'; }, 1000);
            }
        }

        // Toggle Language with Animation
        let isTogglingLanguage = false;

        function toggleLanguage() {
            if (isTogglingLanguage) return;
            isTogglingLanguage = true;

            const img = document.getElementById('inviteImage');
            const btn = document.getElementById('langToggleBtn');

            // Fade out the current image
            img.style.opacity = '0';

            // Wait for fade out to complete before swapping src
            setTimeout(() => {
                // Setup onload to fade in once the new image is ready
                img.onload = function () {
                    img.style.opacity = '1';
                    isTogglingLanguage = false;
                };

                if (img.src.includes('English.jpg')) {
                    img.src = 'Tmail.jpg';
                    btn.textContent = 'English';
                    // Fallback in case the user renames 'Tmail.jpg' to 'Tamil.jpg' later
                    img.onerror = function () {
                        if (img.src.includes('Tmail.jpg')) {
                            img.src = 'Tamil.jpg';
                        } else {
                            // If all fails, still fade back in so it's not permanently hidden
                            img.style.opacity = '1';
                            isTogglingLanguage = false;
                        }
                    };
                } else {
                    img.src = 'English.jpg';
                    btn.textContent = 'Tamil';
                }
            }, 500); // 500ms matches the Tailwind duration-500
        }
    </script>
</body>

</html>
